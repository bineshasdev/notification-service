name: Deploy Notification Service to ECS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/deploy-notification-service-ecs.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flowcore-notification-service
  ECS_SERVICE: notification-service
  ECS_CLUSTER: flowcore-cluster
  CONTAINER_NAME: notification-service
  NODE_VERSION: '22'

jobs:
  # ── CI: lint, type-check, test ─────────────────────────────────────────────
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 14

  # ── CD: build image and deploy to ECS ─────────────────────────────────────
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            NODE_ENV=production
            PORT=3002
            DATABASE_URL=${{ secrets.NOTIFICATION_DB_URL }}
            REDIS_URL=${{ secrets.NOTIFICATION_REDIS_URL }}
            REDIS_PREFIX=notif:
            KAFKA_BROKERS=${{ secrets.KAFKA_BROKERS }}
            KAFKA_GROUP_ID=notification-service
            KAFKA_CLIENT_ID=notification-service
            KAFKA_TOPIC_NOTIFICATION_EVENTS=platform.notification.events
            SCHEMA_REGISTRY_URL=${{ secrets.SCHEMA_REGISTRY_URL }}
            SOCKET_CORS_ORIGIN=${{ secrets.SOCKET_CORS_ORIGIN }}
            JWKS_URI=${{ secrets.JWKS_URI }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            EMAIL_PROVIDER=${{ secrets.EMAIL_PROVIDER }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            MAX_RETRY_ATTEMPTS=3
            RETRY_DELAY_MS=5000

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        if: always()
        run: |
          ENV="${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'dev' }}"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful"
            echo "  Environment : $ENV"
            echo "  Image       : ${{ steps.build-image.outputs.image }}"
            echo "  Commit      : ${{ github.sha }}"
          else
            echo "❌ Deployment failed — environment: $ENV, commit: ${{ github.sha }}"
          fi
